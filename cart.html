<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        /* border: 1px solid gold; */
    }
</style>

<body>
    <!-- Navbar -->
    <img src="https://ng.jumia.is/cms/0-1-cpr/2022/june-14/free-delivery-banner.gif" alt="" class="d-md-block d-none"
        style="width: 100%;">
    <img src="https://ng.jumia.is/cms/0-1-cpr/2022/june-14/free-delivery-Mobile-strip.gif" class="d-md-none" alt=""
        style="width: 100%;">
    <!-- Small Devices Navbar-->
    <div
        class="container-fluid bg-white d-md-none d-flex align-items-center justify-content-between shadow p-2 sticky-top">
        <em> <a class="navbar-brand fw-bold fs-5" href="index.html" id="olaBrand">OlaDev <i
                    class="bi bi-stars text-warning"></i></a></em>
        <input class="nosubmit" type="search" placeholder="Search..." id="searchBar" style="display: none;"
            onkeydown="searchBarr(event)">
        <i class="bi bi-search fs-5" id="searchIcon"></i>
    </div>

    <!-- Large Device Navbar -->
    <nav class="navbar sticky-top navbar-expand bg-white container-fluid d-none d-md-block shadow ps-5 mb-1">
        <div id="displayLargeNavbar">
        </div>
    </nav>
    <!-- Cart -->
    <section class="container">
        <div class="d-block d-md-flex gap-3 mt-3">
            <div class="col-12 col-md-7 shadow-lg rounded">
                <div style="border-bottom: 1px solid #DEE2E6;">
                    <h5 class="p-2">Cart</h5>
                </div>
                <div class="d-flex justify-content-between p-2">
                    <div class="d-flex gap-1" style="width: 70%;">
                        <div id="displayImage">
                            image
                        </div>
                        <div id="displayName">info</div>
                    </div>
                    <div>
                        <div id="displayPrice" style="font-size: larger;">₦ 5,626</div>
                        <div class="d-flex justify-content-between">
                            <em style="text-decoration: line-through;font-size: medium;color: #424242;"
                                id="displayOldPrice">₦ 9,909
                            </em><span class="text-warning" id="displayPercent">-32%</span>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-between p-2">
                    <p>remove</p>
                    <p>quantity</p>
                </div>

            </div>
            <!-- Cart Summary -->
            <div class="col-9 col-md-3 shadow-lg rounded m-auto mt-2">
                <div style="border-bottom: 1px solid #DEE2E6;">
                    <h5 class="p-2">CART SUMMARY</h5>
                </div>
                <div class="d-flex justify-content-between p-2" style="border-bottom: 1px solid #DEE2E6;">
                    <div>Subtotal</div>
                    <div id="displayTotalPrice">₦ 5,626</div>
                </div>
                <div class="p-2">
                    <button class="btn col-12" style="background-color: #f68b1e;color: #fff;">CHECKOUT</button>
                </div>
            </div>
        </div>
    </section>
    <!--Small Devices Footer -->
    <footer class="sticky-bottom">
        <div id="displaySmfooter"></div>
    </footer>

    <div class="offcanvas offcanvas-start" style="width: 80%;" tabindex="-1" id="offcanvasExample"
        aria-labelledby="offcanvasExampleLabel">

    </div>
    <script>
        let cartItem = JSON.parse(localStorage.getItem("cartItem"))
        cartItem.map((item) => {
            //    console.log(item);
            displayImage.innerHTML = `<img src="${item.itemImage}" style="height: 100px" /> `
            displayName.innerHTML = item.itemName
            displayPrice.innerHTML = item.itemOldPrice
            displayOldPrice.innerHTML = item.itemOldPrice
            displayPrice.innerHTML = item.itemPrice
            displayTotalPrice.innerHTML = item.itemPrice
        })
        //   Navbars
        let navbars = JSON.parse(localStorage.getItem("Navbars"))
        navbars.map((eachItem) => {
            displayLargeNavbar.innerHTML = `${eachItem.largeDeviceNav}`
            displaySmfooter.innerHTML = `${eachItem.smallDeviceFooter}`
            offcanvasExample.innerHTML = `${eachItem.offCanvasMenu}`

        })

        // SearchBars
        searchIcon.addEventListener("click", () => {
            searchIcon.style.display = "none"
            olaBrand.style.display = "none"
            searchBar.style.display = "block"
        })
        const searchBarr = (event) => {
            console.log(event.keyCode);
            if (event.keyCode == 13) {
                alert("Searching...")
                searchIcon.style.display = "flex"
                olaBrand.style.display = "flex"
                searchBar.style.display = "none"
            }
        }
        const searchBarrr = () => {
            alert("Searching...")

        }

    </script>
</body>

</html>
