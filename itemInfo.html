<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="itemInfo.css">
    <title>Document</title>
</head>

<body>
    <!-- Navbar -->
    <img src="https://ng.jumia.is/cms/0-1-cpr/2022/june-14/free-delivery-banner.gif" alt="" class="d-md-block d-none"
        style="width: 100%;">
    <img src="https://ng.jumia.is/cms/0-1-cpr/2022/june-14/free-delivery-Mobile-strip.gif" class="d-md-none" alt=""
        style="width: 100%;">
    <!-- Small Devices Navbar-->
    <div
        class="container-fluid bg-white d-md-none d-flex align-items-center justify-content-between shadow p-2 sticky-top">
        <em> <a class="navbar-brand fw-bold fs-5" href="#" id="olaBrand">OlaDev <i
                    class="bi bi-stars text-warning"></i></a></em>
        <input class="nosubmit" type="search" placeholder="Search..." id="searchBar" style="display: none;"
            onkeydown="searchBarr(event)">
        <i class="bi bi-search fs-5" id="searchIcon"></i>
    </div>

    <!-- Large Device Navbar -->
    <nav class="navbar sticky-top navbar-expand bg-white container-fluid d-none d-md-block shadow ps-5 mb-1">
        <div id="displayLargeNavbar">
        </div>
    </nav>
    <!-- item Info -->
    <section class="m-auto col-12 col-md-5 ">
        <div id="displayInfo"></div>

        <div class="text-center">
            <div>
                <button class="quantity-btn btn-outline-secondary" onclick="quantitySub()">-</button> <b id="quantity">1</b> <button
                    class="quantity-btn  btn-outline-secondary" onclick="quantityAdd()">+</button>
            </div>
            <div>
                <button onclick="addToCart()" class="addToCartBtn btn btn-warning col-7 mt-2">ADD TO CART</button>
            </div>
        </div>
    </section>
     <!--Small Devices Footer -->
      <footer class="sticky-bottom">
         <div id="displaySmfooter"></div>
      </footer>

      <div class="offcanvas offcanvas-start" style="width: 80%;" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">

      </div>

    <script src="itemInfo.js">
    </script>
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
